<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visa France — Évaluation de dossier</title>
    <style>
        :root {
            --primary: #1a56db;
            --primary-dark: #1e429f;
            --primary-light: #eff6ff;
            --secondary: #64748b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            background-color: var(--bg);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            max-width: 680px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .screen { display: none; animation: fadeIn 0.3s ease-out; }
        .screen.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography */
        h1 { font-size: 1.5rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.025em; margin-bottom: 0.5rem; }
        h2 { font-size: 1.25rem; font-weight: 700; color: var(--text-main); margin-bottom: 1rem; }
        h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; }
        p { font-size: 0.935rem; color: var(--text-muted); }

        /* Cards & Containers */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.25rem;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            background: white;
            color: var(--text-main);
        }

        .btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
        
        .btn-p {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-p:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 10px 15px -3px rgba(26, 86, 219, 0.2); }

        .btn-full { width: 100%; }

        /* Progress Bar */
        .prog-wrap { margin-bottom: 2rem; }
        .prog-lbl { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom: 0.5rem; }
        .prog-bar { height: 8px; background: var(--border); border-radius: 10px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--primary); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Form Elements */
        .field { margin-bottom: 1.5rem; }
        label.fl { display: block; font-size: 0.85rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.75rem; }

        input[type=text], select, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            transition: border-color 0.2s;
            background: white;
        }

        input:focus { outline: none; border-color: var(--primary); ring: 2px solid var(--primary-light); }

        /* Custom Selection UI */
        .ropt, .copt {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .ropt:hover, .copt:hover { border-color: var(--primary); background: var(--primary-light); }
        
        .ropt.sel, .copt.sel {
            border-color: var(--primary);
            background: var(--primary-light);
            border-width: 2px;
            padding: calc(1rem - 1px);
        }

        .rdisc, .cbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .rdisc { border-radius: 50%; }
        .cbox { border-radius: 4px; }

        .sel .rdisc { border-color: var(--primary); border-width: 6px; }
        .sel .cbox { background: var(--primary); border-color: var(--primary); }

        /* Score & Results */
        .score-ring {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 1.5rem auto;
            border: 6px solid var(--border);
            background: white;
        }
        .score-ring b { font-size: 1.75rem; font-weight: 800; }
        .score-ring span { font-size: 0.75rem; color: var(--text-muted); }

        .badge {
            display: inline-flex;
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .b-info { background: var(--primary-light); color: var(--primary); }

        /* Alerts & Notes */
        .disc {
            font-size: 0.85rem;
            background: #fffbeb;
            border: 1px solid #fef3c7;
            color: #92400e;
            padding: 1rem;
            border-radius: var(--radius);
            margin-top: 2rem;
        }

        .wa-pre, .json-box {
            background: #1e293b;
            color: #f8fafc;
            padding: 1rem;
            border-radius: var(--radius);
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.8rem;
            overflow-x: auto;
        }

        .nav-btns { display: flex; gap: 1rem; margin-top: 2rem; }
        .nav-btns .btn { flex: 1; }

        .rtl { direction: rtl; text-align: right; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media(max-width: 480px) { .two-col { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="app" id="APP">

    <div class="screen active" id="s0">
        <div style="text-align:center; padding: 3rem 1rem;">
            <div style="font-size:3rem; margin-bottom:1.5rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1))">🇫🇷</div>
            <h1>Visa France</h1>
            <p>Évaluation de dossier & aide à la préparation</p>
            <p style="font-size:0.8rem; margin-bottom:2.5rem; opacity:0.8">المغرب — خدمة مساعدة في تحضير ملف التأشيرة</p>
            
            <div class="two-col" style="max-width: 400px; margin: 0 auto;">
                <button class="btn btn-p btn-full" style="height: auto; padding: 1.5rem 1rem; flex-direction: column;" onclick="init('fr')">
                    <span style="font-size:1.5rem">Français</span>
                    <span style="font-size:0.7rem; font-weight:400; opacity:0.9">Commencer</span>
                </button>
                <button class="btn btn-full" style="height: auto; padding: 1.5rem 1rem; flex-direction: column;" onclick="init('ar')">
                    <span style="font-size:1.5rem">العربية</span>
                    <span style="font-size:0.7rem; font-weight:400; opacity:0.9">ابدأ الآن</span>
                </button>
            </div>
        </div>
        <div class="disc">
            <strong>⚠️ Avis important :</strong> Ce service est un outil d'aide indépendant. Il ne garantit pas l'obtention du visa. La décision finale appartient au Consulat.
        </div>
    </div>

    <div class="screen" id="s1">
        <div class="prog-wrap">
            <div class="prog-lbl">
                <span id="stepLbl">Étape 1</span>
                <span id="stepPct">10%</span>
            </div>
            <div class="prog-bar"><div class="prog-fill" id="pFill" style="width:10%"></div></div>
        </div>
        
        <div id="qZone" class="card">
            </div>

        <div class="nav-btns">
            <button class="btn" id="btnBack" onclick="prevQ()">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                <span id="lblBack">Retour</span>
            </button>
            <button class="btn btn-p" id="btnFwd" onclick="nextQ()">
                <span id="lblFwd">Continuer</span>
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </button>
        </div>
    </div>

    <div class="screen" id="s2"><div id="rZone"></div></div>
    <div class="screen" id="s3"><div id="pkZone"></div></div>
    <div class="screen" id="s4"><div id="waZone"></div></div>
    <div class="screen" id="s5"><div id="jsZone"></div></div>

</div>

<script>
var LANG='fr', ANS={}, SCORE=0;

var L={
fr:{
  back:'Retour',fwd:'Continuer',calc:'Calculer mon score',
  step:'Étape',of:'sur',
  blocks:[
    'Informations personnelles',
    'Situation professionnelle',
    'Revenus & finances',
    'Objet & durée du voyage',
    'Hébergement & garant',
    'Historique de voyage & refus',
    'Cas spéciaux — Étudiant / Stage',
    'Cas spéciaux — Mineur',
    'Cas spéciaux — Retraité / Sans emploi',
    'Cas spéciaux — Sponsor & Garant',
    'Cas spéciaux — Antécédents de refus',
    'Cas spéciaux — Travailleur indépendant',
    'Documents disponibles & consentement'
  ]
},
ar:{
  back:'رجوع',fwd:'متابعة',calc:'احسب نتيجتي',
  step:'خطوة',of:'من',
  blocks:[
    'المعلومات الشخصية',
    'الوضع المهني',
    'الدخل والماليات',
    'الغرض من السفر والمدة',
    'الإقامة والكفيل',
    'تاريخ السفر والرفض',
    'حالات خاصة — طالب / متدرب',
    'حالات خاصة — قاصر',
    'حالات خاصة — متقاعد / بدون عمل',
    'حالات خاصة — الكفيل والضامن',
    'حالات خاصة — سوابق الرفض',
    'حالات خاصة — عامل مستقل',
    'الوثائق المتوفرة والموافقة'
  ]
}
};

function T(key){return L[LANG][key]||key;}

// ALL QUESTIONS indexed by block
var QBLOCKS_FR=[
  // 0 - Infos perso
  [
    {id:'prenom',lbl:'Prénom',type:'text',req:true,imp:'Identification'},
    {id:'nom',lbl:'Nom de famille',type:'text',req:true,imp:'Identification'},
    {id:'age',lbl:'Tranche d\'âge',type:'radio',req:true,imp:'Détermine les sous-questions (mineur, retraité...)',
     opts:['Moins de 18 ans (mineur)','18–25 ans','26–35 ans','36–50 ans','51–65 ans','Plus de 65 ans (retraité)']},
    {id:'sexe',lbl:'Genre',type:'radio',req:false,imp:'Cohérence administrative',
     opts:['Homme','Femme','Non précisé']},
    {id:'nationalite',lbl:'Nationalité',type:'radio',req:true,imp:'Passeport et procédure',
     opts:['Marocaine uniquement','Double nationalité (Maroc + autre)','Autre (résidant au Maroc)']},
    {id:'ville_maroc',lbl:'Ville de résidence au Maroc',type:'radio',req:true,imp:'Consulat compétent (Casablanca, Rabat, Fès, Marrakech, Agadir)',
     opts:['Casablanca','Rabat','Fès','Marrakech','Agadir','Tanger','Oujda','Autre ville']},
    {id:'statut_civil',lbl:'Situation familiale',type:'radio',req:true,imp:'Attaches au Maroc — jusqu\'à 8 pts',
     opts:['Célibataire sans enfants','Célibataire avec enfants','Marié(e) sans enfants','Marié(e) avec enfants','Divorcé(e)','Veuf/Veuve','En concubinage']},
    {id:'enfants_maroc',lbl:'Avez-vous des enfants mineurs résidant au Maroc ?',type:'radio',req:true,imp:'+5 pts — ancrage fort',
     opts:['Oui','Non']},
    {id:'conjoint_maroc',lbl:'Votre conjoint(e) reste-t-il/elle au Maroc pendant votre absence ?',type:'radio',req:false,imp:'+4 pts — retour garanti',
     opts:['Oui, conjoint(e) reste au Maroc','Non, voyage ensemble','Non applicable']},
  ],
  // 1 - Emploi
  [
    {id:'emploi',lbl:'Situation professionnelle actuelle',type:'radio',req:true,imp:'Critère majeur — jusqu\'à 15 pts',
     opts:['Salarié(e) secteur privé (CDI)','Salarié(e) secteur privé (CDD)','Fonctionnaire / Salarié secteur public','Commerçant(e) inscrit(e)','Travailleur(se) indépendant(e) / Freelance','Auto-entrepreneur(se)','Chef(fe) d\'entreprise / Gérant(e)','Étudiant(e) (enseignement supérieur)','Lycéen(ne) / Élève','Retraité(e)','Sans emploi (chercheur d\'emploi)','Femme/Homme au foyer','Autre']},
    {id:'anciennete',lbl:'Ancienneté dans votre poste ou activité actuelle',type:'radio',req:false,imp:'Stabilité — jusqu\'à 8 pts',
     opts:['Moins de 3 mois','3 à 6 mois','6 mois à 1 an','1 à 3 ans','Plus de 3 ans','Non applicable']},
    {id:'secteur',lbl:'Secteur d\'activité ou domaine d\'études',type:'text',req:false,imp:'Cohérence du motif'},
    {id:'employeur_connu',lbl:'Votre employeur est-il connu / référencé (grande entreprise, administration, multinationale) ?',type:'radio',req:false,imp:'Crédibilité employeur +3',
     opts:['Oui, grande entreprise / admin connue','Oui, PME locale connue','Non, petite structure','Non applicable']},
  ],
  // 2 - Finances
  [
    {id:'revenu',lbl:'Revenu mensuel net déclaré (MAD)',type:'radio',req:true,imp:'Critère majeur — jusqu\'à 15 pts',
     opts:['Moins de 3 000 MAD','3 000 – 5 000 MAD','5 000 – 8 000 MAD','8 000 – 15 000 MAD','15 000 – 25 000 MAD','Plus de 25 000 MAD','Revenus variables / irréguliers','Pris(e) en charge par un tiers / sponsor']},
    {id:'epargne',lbl:'Épargne disponible (compte épargne, livret, CCP...)',type:'radio',req:true,imp:'Solvabilité — jusqu\'à 8 pts',
     opts:['Moins de 3 000 MAD','3 000 – 10 000 MAD','10 000 – 25 000 MAD','25 000 – 50 000 MAD','Plus de 50 000 MAD']},
    {id:'releves',lbl:'État de votre compte bancaire principal (3 derniers mois)',type:'radio',req:true,imp:'Document critique — jusqu\'à 6 pts',
     opts:['Compte actif, mouvements réguliers et positifs','Compte actif, mais solde faible ou irrégulier','Compte récemment ouvert (moins de 3 mois)','Pas de compte bancaire formel']},
    {id:'dettes',lbl:'Avez-vous des crédits ou dettes en cours ?',type:'radio',req:false,imp:'Signal de fragilité si élevé',
     opts:['Non, aucun crédit','Oui, crédit immobilier (hypothèque)','Oui, crédit auto / consommation','Oui, plusieurs crédits','Oui, et difficultés de remboursement']},
    {id:'budget_voyage',lbl:'Budget total prévu pour ce voyage (billets + hébergement + frais)',type:'radio',req:false,imp:'Cohérence financière du projet',
     opts:['Moins de 5 000 MAD','5 000 – 10 000 MAD','10 000 – 20 000 MAD','20 000 – 40 000 MAD','Plus de 40 000 MAD','Pris en charge par un tiers']},
  ],
  // 3 - Motif voyage
  [
    {id:'motif',lbl:'Motif principal du voyage',type:'radio',req:true,imp:'Détermine le parcours France-Visas et les documents requis',
     opts:['Tourisme / Loisirs','Visite familiale (famille en France)','Visite amicale (ami(e) en France)','Voyage d\'affaires / Réunion professionnelle','Conférence / Salon professionnel','Études (inscription université/école)','Stage professionnel (convention de stage)','Formation courte (moins de 3 mois)','Traitement médical','Transit France','Mariage en France','Autre séjour justifié']},
    {id:'duree',lbl:'Durée prévue du séjour',type:'radio',req:true,imp:'Cohérence avec motif — drapeau si incohérence',
     opts:['1 à 5 jours','6 à 10 jours','11 à 21 jours','22 à 30 jours','31 à 60 jours','61 à 90 jours','Plus de 90 jours (visa long séjour)']},
    {id:'destination_fr',lbl:'Destination(s) principale(s) en France',type:'text',req:false,imp:'Cohérence ville/motif'},
    {id:'premier_voyage',lbl:'Est-ce votre premier voyage en France ?',type:'radio',req:true,imp:'Primo-demandeur = sous-questions spécifiques',
     opts:['Oui, première fois','Non, j\'ai déjà été en France','Non, j\'ai un visa France en cours de validité']},
    {id:'aller_retour',lbl:'Avez-vous déjà acheté ou réservé les billets d\'avion ?',type:'radio',req:true,imp:'Billet retour = preuve d\'intention de retour +4',
     opts:['Oui, billets aller-retour achetés','Oui, réservation uniquement (non payée)','Non, pas encore','Voyage en voiture / train / bateau']},
  ],
  // 4 - Hébergement
  [
    {id:'hebergement',lbl:'Type d\'hébergement prévu en France',type:'radio',req:true,imp:'Preuve hébergement obligatoire — jusqu\'à 7 pts',
     opts:['Attestation d\'hébergement officielle (famille/ami)','Réservation hôtel confirmée et payée','Réservation hôtel non payée','Location Airbnb / appartement (confirmation)','Résidence universitaire / CROUS','Hébergement employeur / entreprise (lettre)','Logement médical (clinique/hôpital)','Pas encore défini']},
    {id:'invitant_statut',lbl:'Statut de la personne qui vous héberge (si hébergement privé)',type:'radio',req:false,imp:'Crédibilité de l\'invitation',
     opts:['Citoyen(ne) français(e)','Résident(e) permanent(e) en France','Titulaire d\'un titre de séjour valide','Étudiant(e) en France','Non applicable (hôtel/résidence)']},
    {id:'invitant_lien',lbl:'Lien avec la personne hébergeante',type:'radio',req:false,imp:'Cohérence familiale/sociale',
     opts:['Parent direct (père/mère/enfant/frère/sœur)','Conjoint(e) / Partenaire','Grand-parent / oncle / tante / cousin(e)','Ami(e) proche','Collègue / relation professionnelle','Non applicable']},
    {id:'garant_finance',lbl:'Qui assure la prise en charge financière du séjour ?',type:'radio',req:true,imp:'Clarté de prise en charge — jusqu\'à 8 pts',
     opts:['Moi-même (fonds propres)','Famille en France (attestation de prise en charge)','Famille au Maroc (virement prévu)','Mon employeur au Maroc','Mon employeur / partenaire en France','Bourse / établissement d\'enseignement','Non encore défini']},
    {id:'assurance',lbl:'Assurance voyage médicale (min. 30 000 € couvrant tout l\'espace Schengen)',type:'radio',req:true,imp:'OBLIGATOIRE — bloquant si absent',
     opts:['Oui, déjà souscrite (document disponible)','Oui, prévue mais pas encore souscrite','Non']},
  ],
  // 5 - Historique
  [
    {id:'hist_voyage',lbl:'Avez-vous déjà voyagé à l\'étranger (hors Maroc) ?',type:'radio',req:true,imp:'Historique — jusqu\'à 10 pts',
     opts:['Oui, plusieurs fois dans l\'espace Schengen','Oui, une fois dans l\'espace Schengen','Oui, hors espace Schengen (Turquie, Emirats, USA...)','Oui, en Afrique / Moyen-Orient uniquement','Non, jamais voyagé à l\'étranger']},
    {id:'visa_schengen_actif',lbl:'Avez-vous un visa Schengen en cours de validité ?',type:'radio',req:true,imp:'Signal très fort +8',
     opts:['Oui, visa Schengen actif (non expiré)','Oui, expiré il y a moins de 12 mois','Oui, expiré il y a plus de 12 mois','Non, jamais eu de visa Schengen']},
    {id:'usa_uk_visa',lbl:'Avez-vous un visa USA, UK, Canada, Australie en cours de validité ou récent ?',type:'radio',req:false,imp:'Profil voyageur rassurant +3',
     opts:['Oui, USA ou Canada','Oui, Royaume-Uni','Oui, Australie / Nouvelle-Zélande','Autre pays hors Schengen','Non']},
    {id:'refus',lbl:'Avez-vous déjà essuyé un refus de visa ?',type:'radio',req:true,imp:'Drapeau rouge majeur — jusqu\'à -18 pts',
     opts:['Non, aucun refus','Oui, un refus France (Schengen)','Oui, un refus autre pays Schengen','Oui, un refus hors Schengen (USA, UK...)','Oui, plusieurs refus (2 et plus)']},
    {id:'interdiction',lbl:'Faites-vous l\'objet d\'une interdiction de territoire ou d\'un refus d\'entrée connu ?',type:'radio',req:true,imp:'Bloquant absolu si oui',
     opts:['Non','Oui, interdiction de territoire française','Oui, signalement SIS (espace Schengen)','Je ne suis pas sûr(e)']},
  ],
  // 6 - Cas spécial Étudiant/Stage
  [
    {id:'etudiant_etablissement',lbl:'Êtes-vous inscrit(e) ou pré-inscrit(e) dans un établissement français ?',type:'radio',req:false,imp:'Inscription = preuve fondamentale études',
     opts:['Oui, inscription ferme (lettre d\'admission)','Oui, pré-inscription (conditionnelle)','Non, en cours de démarche','Non applicable']},
    {id:'campus_france',lbl:'Avez-vous passé par la procédure Campus France Maroc ?',type:'radio',req:false,imp:'Obligatoire pour certaines filières — +5 pts si complété',
     opts:['Oui, dossier Campus France validé','Oui, en cours','Non (filière non concernée)','Non applicable']},
    {id:'bourse',lbl:'Bénéficiez-vous d\'une bourse d\'études ou d\'une aide financière pour ce séjour ?',type:'radio',req:false,imp:'+5 pts — financement rassurant',
     opts:['Oui, bourse marocaine (AMCI, université...)','Oui, bourse française (gouvernementale, Erasmus...)','Oui, bourse entreprise / fondation privée','Non']},
    {id:'stage_convention',lbl:'Disposez-vous d\'une convention de stage signée par les deux parties ?',type:'radio',req:false,imp:'Document obligatoire pour visa stage',
     opts:['Oui, convention de stage signée','Non, en cours de signature','Non applicable']},
    {id:'stage_duree',lbl:'Durée du stage prévu',type:'radio',req:false,imp:'Stage > 3 mois = visa long séjour nécessaire',
     opts:['Moins d\'1 mois','1 à 3 mois (visa court séjour possible)','3 à 6 mois (visa long séjour requis)','6 mois à 1 an','Plus d\'1 an','Non applicable']},
    {id:'logement_etudiant',lbl:'Logement étudiant confirmé en France ?',type:'radio',req:false,imp:'Preuve hébergement critique pour visa étudiant',
     opts:['Oui, CROUS (attestation disponible)','Oui, résidence privée étudiante','Oui, chez de la famille','Oui, appartement partagé (bail signé)','Non, pas encore confirmé','Non applicable']},
  ],

// WHICH BLOCKS TO SHOW based on answers
function getActiveBlocks(){
  var blocks=[0,1,2,3,4,5]; // always shown
  var age=ANS.age||'';
  var emploi=ANS.emploi||'';
  var motif=ANS.motif||'';
  var refus=ANS.refus||'';
  
  var isMineur=age.includes('18')||age.includes('أقل من 18');
  var isEtudiant=emploi.includes('tudiant')||emploi.includes('طالب')||emploi.includes('ycéen')||emploi.includes('تلميذ')||motif.includes('tudes')||motif.includes('دراسة')||motif.includes('tage')||motif.includes('تدريب')||motif.includes('Stage');
  var isRetraite=emploi.includes('traité')||emploi.includes('متقاعد')||emploi.includes('Sans emploi')||emploi.includes('بدون عمل')||emploi.includes('foyer')||emploi.includes('بيت');
  var hasGarant=ANS.garant_finance&&(ANS.garant_finance.includes('France')||ANS.garant_finance.includes('فرنسا')||ANS.garant_finance.includes('sponsor')||ANS.sponsor!=='Non');
  var hasRefus=refus&&!refus.includes('Non, aucun')&&!refus.includes('لا، لا يوجد');
  var isIndep=emploi.includes('ndépendant')||emploi.includes('مستقل')||emploi.includes('ommerçant')||emploi.includes('تاجر')||emploi.includes('Auto-entrepreneur')||emploi.includes('مقاولة ذاتية')||emploi.includes('hef')||emploi.includes('مدير');

  if(isEtudiant) blocks.push(6);
  if(isMineur) blocks.push(7);
  if(isRetraite) blocks.push(8);
  if(hasGarant||ANS.sponsor_type) blocks.push(9);
  if(hasRefus) blocks.push(10);
  if(isIndep) blocks.push(11);
  blocks.push(12); // always last
  return blocks;
}

var activeBlocks=[], blockIdx=0;

function init(l){
  LANG=l;
  ANS={};SCORE=0;blockIdx=0;
  activeBlocks=getActiveBlocks();
  document.getElementById('lblBack').textContent=T('back');
  document.getElementById('lblFwd').textContent=T('fwd');
  showS('s1');
  renderBlock();
}

function showS(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
  document.getElementById(id).classList.add('active');
}

var isRTL=function(){return LANG==='ar';};

function renderBlock(){
  activeBlocks=getActiveBlocks();
  var bi=activeBlocks[blockIdx];
  var QBLOCKS=LANG==='fr'?QBLOCKS_FR:QBLOCKS_AR;
  var block=QBLOCKS[bi];
  var blockName=L[LANG].blocks[bi];
  var pct=Math.round(((blockIdx+1)/(activeBlocks.length))*100);
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('stepLbl').textContent=T('step')+' '+(blockIdx+1)+' '+T('of')+' '+activeBlocks.length+' — '+blockName;
  document.getElementById('stepPct').textContent=pct+'%';
  document.getElementById('lblFwd').textContent=blockIdx===activeBlocks.length-1?T('calc'):T('fwd');
  document.getElementById('btnBack').style.display=blockIdx===0?'none':'flex';

  var dir=isRTL()?'dir="rtl"':'';
  var html='<div class="card" '+dir+'><div class="section-tag">'+blockName+'</div>';

  block.forEach(function(q){
    html+='<div class="field"><label class="fl">'+q.lbl+(q.req?' <span style="color:var(--color-text-danger)">*</span>':'')+'</label>';
    if(q.type==='text'){
      html+='<input type="text" value="'+(ANS[q.id]||'')+'" oninput="ANS[\''+q.id+'\']=this.value" placeholder="'+(isRTL()?'أدخل إجابتك...':'Votre réponse...')+'">';
    } else if(q.type==='select'){
      html+='<select onchange="ANS[\''+q.id+'\']=this.value"><option value="">'+(isRTL()?'اختر...':'Choisir...')+'</option>';
      q.opts.forEach(function(o){html+='<option value="'+esc(o)+'" '+(ANS[q.id]===o?'selected':'')+'>'+o+'</option>';});
      html+='</select>';
    } else if(q.type==='radio'){
      html+='<div class="rgroup">';
      q.opts.forEach(function(o){
        var sel=ANS[q.id]===o;
        html+='<div class="ropt '+(sel?'sel':'')+'" onclick="pickR(\''+q.id+'\',\''+esc(o)+'\')"><div class="rdisc"></div>'+o+'</div>';
      });
      html+='</div>';
    } else if(q.type==='check'){
      html+='<div class="cgroup">';
      q.opts.forEach(function(o){
        var arr=ANS[q.id]||[];
        var sel=arr.indexOf(o)>=0;
        html+='<div class="copt '+(sel?'sel':'')+'" onclick="pickC(\''+q.id+'\',\''+esc(o)+'\')"><div class="cbox"></div>'+o+'</div>';
      });
      html+='</div>';
    }
    html+='<div class="impact-note">'+(isRTL()?'التأثير: ':'Impact : ')+q.imp+'</div></div>';
  });

  html+='</div>';
  document.getElementById('qZone').innerHTML=html;
  document.getElementById('qZone').scrollTop=0;
}

function esc(s){return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}

function pickR(id,val){ANS[id]=val;renderBlock();}

function pickC(id,val){
  if(!ANS[id]) ANS[id]=[];
  var i=ANS[id].indexOf(val);
  if(i>=0) ANS[id].splice(i,1); else ANS[id].push(val);
  renderBlock();
}

function nextQ(){
  activeBlocks=getActiveBlocks();
  if(blockIdx<activeBlocks.length-1){blockIdx++;renderBlock();}
  else{calcAndReport();}
}

function prevQ(){
  if(blockIdx>0){blockIdx--;renderBlock();}
}

  var fr=LANG==='fr';
  // 1. Emploi (15)
  var eMap={'Salarié(e) secteur public / fonctionnaire':15,'Fonctionnaire / Salarié secteur public':15,'Salarié(e) secteur privé (CDI)':13,'Salarié(e) secteur privé (CDD)':8,'Chef(fe) d\'entreprise / Gérant(e)':11,'Commerçant(e) inscrit(e)':9,'Travailleur(se) indépendant(e) / Freelance':8,'Auto-entrepreneur(se)':7,'Étudiant(e) (enseignement supérieur)':7,'Lycéen(ne) / Élève':5,'Retraité(e)':10,'Sans emploi (chercheur d\'emploi)':2,'Femme/Homme au foyer':4,'Autre':4,
    'موظف في القطاع العام / وظيفة حكومية':15,'موظف في القطاع الخاص (عقد دائم CDI)':13,'موظف في القطاع الخاص (عقد مؤقت CDD)':8,'مدير شركة / مسيّر':11,'تاجر مسجل':9,'عامل مستقل / فريلانس':8,'صاحب مقاولة ذاتية':7,'طالب/طالبة (تعليم عالٍ)':7,'تلميذ/تلميذة':5,'متقاعد(ة)':10,'بدون عمل (باحث/ة عن عمل)':2,'ربة/رب بيت':4,'أخرى':4};
  s+=eMap[ANS.emploi]||4;
  // Ancienneté (8)
  var aMap={'Plus de 3 ans':8,'أكثر من 3 سنوات':8,'1 à 3 ans':6,'سنة إلى 3 سنوات':6,'6 mois à 1 an':3,'6 أشهر إلى سنة':3,'3 à 6 mois':2,'3 إلى 6 أشهر':2,'Moins de 3 mois':0,'أقل من 3 أشهر':0};
  s+=aMap[ANS.anciennete]||0;
  // Revenu (15)
  var rMap={'Plus de 25 000 MAD':15,'أكثر من 25000 درهم':15,'15 000 – 25 000 MAD':12,'15000 – 25000 درهم':12,'8 000 – 15 000 MAD':9,'8000 – 15000 درهم':9,'5 000 – 8 000 MAD':7,'5000 – 8000 درهم':7,'3 000 – 5 000 MAD':5,'3000 – 5000 درهم':5,'Moins de 3 000 MAD':2,'أقل من 3000 درهم':2,'Revenus variables / irréguliers':3,'دخل متغير / غير منتظم':3,'Pris(e) en charge par un tiers / sponsor':6,'يتكفل به شخص آخر':6};
  s+=rMap[ANS.revenu]||3;
  // Épargne (8)
  var epMap={'Plus de 50 000 MAD':8,'أكثر من 50000 درهم':8,'25 000 – 50 000 MAD':6,'25000 – 50000 درهم':6,'10 000 – 25 000 MAD':4,'10000 – 25000 درهم':4,'3 000 – 10 000 MAD':2,'3000 – 10000 درهم':2,'Moins de 3 000 MAD':0,'أقل من 3000 درهم':0};
  s+=epMap[ANS.epargne]||2;
  // Relevés (6)
  if(ANS.releves==='Compte actif, mouvements réguliers et positifs'||ANS.releves==='حساب نشط، تحركات منتظمة وإيجابية') s+=6;
  else if(ANS.releves==='Compte actif, mais solde faible ou irrégulier'||ANS.releves==='حساب نشط، لكن رصيد ضعيف أو غير منتظم') s+=3;
  // Historique (10)
  var hMap={'Oui, plusieurs fois dans l\'espace Schengen':10,'نعم، عدة مرات في منطقة شنغن':10,'Oui, une fois dans l\'espace Schengen':7,'نعم، مرة واحدة في منطقة شنغن':7,'Oui, hors espace Schengen (Turquie, Emirats, USA...)':5,'نعم، خارج شنغن (تركيا، الإمارات، أمريكا...)':5,'Oui, en Afrique / Moyen-Orient uniquement':2,'نعم، في إفريقيا / الشرق الأوسط فقط':2,'Non, jamais voyagé à l\'étranger':0,'لا، لم أسافر إلى الخارج قط':0};
  s+=hMap[ANS.hist_voyage]||0;
  // Visa Schengen actif (8)
  if(ANS.visa_schengen_actif==='Oui, visa Schengen actif (non expiré)'||ANS.visa_schengen_actif==='نعم، تأشيرة شنغن سارية (غير منتهية)') s+=8;
  else if(ANS.visa_schengen_actif==='Oui, expiré il y a moins de 12 mois'||ANS.visa_schengen_actif==='نعم، منتهية منذ أقل من 12 شهراً') s+=4;
  else if(ANS.visa_schengen_actif==='Oui, expiré il y a plus de 12 mois'||ANS.visa_schengen_actif==='نعم، منتهية منذ أكثر من 12 شهراً') s+=1;
  // USA/UK visa bonus (3)
  if(ANS.usa_uk_visa&&!ANS.usa_uk_visa.includes('Non')&&!ANS.usa_uk_visa.includes('لا')) s+=3;
  // Refus (-18)
  var rfMap={'Non, aucun refus':0,'لا، لا يوجد رفض':0,'Oui, un refus France (Schengen)':-12,'نعم، رفض واحد (فرنسا - شنغن)':-12,'Oui, un refus autre pays Schengen':-8,'نعم، رفض من دولة شنغن أخرى':-8,'Oui, un refus hors Schengen (USA, UK...)':-5,'نعم، رفض خارج شنغن (أمريكا، بريطانيا...)':-5,'Oui, plusieurs refus (2 et plus)':-18,'نعم، رفضات متعددة (2 أو أكثر)':-18};
  s+=rfMap[ANS.refus]||0;
  // Interdiction absolue
  if(ANS.interdiction&&(ANS.interdiction.includes('interdiction')||ANS.interdiction.includes('SIS')||ANS.interdiction.includes('حظر')||ANS.interdiction.includes('إشعار SIS'))) s-=50;
  // Attaches (10)
  if(ANS.statut_civil&&(ANS.statut_civil.includes('arié')||ANS.statut_civil.includes('متزوج'))) s+=5;
  if(ANS.enfants_maroc==='Oui'||ANS.enfants_maroc==='نعم') s+=4;
  if(ANS.conjoint_maroc&&(ANS.conjoint_maroc.includes('reste'))||ANS.conjoint_maroc==='نعم، يبقى/تبقى في المغرب') s+=3;
  // Immobilier retraité (5)
  if(ANS.retraite_biens&&(ANS.retraite_biens.includes('propriétaire')||ANS.retraite_biens.includes('mالك')||ANS.retraite_biens.includes('مالك'))) s+=4;
  // Documents (20)
  var docs=ANS.docs||[];
  s+=Math.min(20,Math.round(docs.length*1.55));
  // Assurance (5)
  if(ANS.assurance==='Oui, déjà souscrite (document disponible)'||ANS.assurance==='نعم، مشترك به بالفعل (وثيقة متوفرة)') s+=5;
  else if(ANS.assurance==='Oui, prévue mais pas encore souscrite'||ANS.assurance==='نعم، مخطط له لكن لم أشترك بعد') s+=2;
  // Hébergement (7)
  if(ANS.hebergement&&(ANS.hebergement.includes('Attestation')||ANS.hebergement.includes('شهادة إيواء')||ANS.hebergement.includes('CROUS')||ANS.hebergement.includes('Réservation hôtel confirmée')||ANS.hebergement.includes('حجز فندقي مؤكد'))) s+=7;
  else if(ANS.hebergement&&!ANS.hebergement.includes('défini')&&!ANS.hebergement.includes('حُدد')) s+=4;
  // Garant fort en France (5)
  if(ANS.garant_titre&&(ANS.garant_titre.includes('citoyen'))||ANS.garant_titre==='نعم، مواطن فرنسي') s+=4;
  if(ANS.sponsor_doc&&(ANS.sponsor_doc.includes('notariée')||ANS.sponsor_doc==='نعم، شهادة موثقة / قنصلية')) s+=3;
  // Campus France (5)
  if(ANS.campus_france&&(ANS.campus_france.includes('validé')||ANS.campus_france==='نعم، ملف Campus France تم التحقق منه')) s+=5;
  // Bourse (5)
  if(ANS.bourse&&!ANS.bourse.includes('Non')&&!ANS.bourse.includes('لا')) s+=4;
  // Indep solide (6)
  if(ANS.independant_registre&&(ANS.independant_registre.includes('registre')||ANS.independant_registre==='نعم، سجل تجاري (RC)')) s+=3;
  if(ANS.independant_liasse&&(ANS.independant_liasse.includes('disponibles')||ANS.independant_liasse==='نعم، التصريحات الضريبية متوفرة')) s+=3;
  // Refus correction (4)
  if(ANS.refus_action&&(ANS.refus_action.includes('dossier amélioré')||ANS.refus_action==='نعم، تحسين الملف (كشوف، وثائق...)')) s+=4;
  // Aller retour (4)
  if(ANS.aller_retour&&(ANS.aller_retour.includes('aller-retour')||ANS.aller_retour==='نعم، تذاكر ذهاب وإياب محجوزة ومدفوعة')) s+=4;
  // Traduction warning (no pts but flag)
  // Minor: autorisation (3)
  if(ANS.mineur_autorisation&&(ANS.mineur_autorisation.includes('disponible')||ANS.mineur_autorisation==='نعم، الإذن متوفر')) s+=3;

  SCORE=Math.max(0,Math.min(100,Math.round(s)));
  buildReport();


}

function lvl(sc){
  var fr=LANG==='fr';
  if(sc>=90) return {lbl:fr?'Très solide':'ممتاز جداً',cls:'b-ok',col:'#059669'};
  if(sc>=75) return {lbl:fr?'Solide':'قوي',cls:'b-ok',col:'#16a34a'};
  if(sc>=60) return {lbl:fr?'Moyen / améliorable':'متوسط / قابل للتحسين',cls:'b-warn',col:'#d97706'};
  if(sc>=40) return {lbl:fr?'Fragile':'هش',cls:'b-warn',col:'#f59e0b'};
  return {lbl:fr?'Très faible':'ضعيف جداً',cls:'b-danger',col:'#dc2626'};
}

var ALL_DOCS_FR=['Passeport valide (expire au moins 6 mois après la date de retour)','Formulaire de demande France-Visas complété et imprimé','Photos d\'identité conformes aux normes (format biométrique)','Attestation d\'emploi ou de scolarité récente','Bulletins de salaire (3 derniers mois)','Relevés de compte bancaire (3 derniers mois)','Justificatif de domicile au Maroc (moins de 3 mois)','Billet d\'avion aller-retour (ou réservation confirmée)','Preuve d\'hébergement en France (attestation, hôtel, CROUS...)','Assurance voyage / rapatriement (30 000 € min., espace Schengen)','Lettre de motivation du voyage rédigée','Invitation / Attestation d\'hébergement officielle'];
var ALL_DOCS_AR=['جواز سفر ساري المفعول (ينتهي بعد 6 أشهر على الأقل من تاريخ العودة)','نموذج طلب France-Visas مكتمل ومطبوع','صور شخصية مطابقة للمعايير (تنسيق بيومتري)','شهادة عمل أو تسجيل جامعي حديثة','كشوف الراتب (3 أشهر الأخيرة)','كشوف الحساب البنكي (3 أشهر الأخيرة)','إثبات الإقامة في المغرب (أقل من 3 أشهر)','تذكرة طائرة ذهاباً وإياباً (أو حجز مؤكد)','إثبات الإقامة في فرنسا (شهادة، فندق، CROUS...)','تأمين السفر / الإخلاء الطبي (30 000 € على الأقل، منطقة شنغن)','رسالة تحفيزية للسفر مكتوبة','دعوة / شهادة إيواء رسمية'];

function buildReport(){
  var fr=LANG==='fr';
  var lv=lvl(SCORE);
  var docs=ANS.docs||[];
  var ALL_DOCS=fr?ALL_DOCS_FR:ALL_DOCS_AR;
  var missing=ALL_DOCS.filter(function(d){return docs.indexOf(d)<0;});

  var pf=[],pw=[],flags_r=[],flags_o=[];
  if(fr){
    if(ANS.emploi&&!ANS.emploi.includes('Sans emploi')&&!ANS.emploi.includes('foyer')) pf.push('Situation professionnelle stable déclarée');
    if(ANS.visa_schengen_actif&&ANS.visa_schengen_actif.includes('actif')) pf.push('Visa Schengen actif — signal très positif');
    if(ANS.hist_voyage&&ANS.hist_voyage.includes('plusieurs')) pf.push('Historique de voyages multiples dans l\'espace Schengen');
    if(docs.length>=9) pf.push('Dossier documentaire bien constitué ('+docs.length+' pièces)');
    if(ANS.statut_civil&&ANS.statut_civil.includes('arié')) pf.push('Situation matrimoniale = ancrage fort au Maroc');
    if(ANS.enfants_maroc==='Oui') pf.push('Enfants mineurs au Maroc = preuve de retour');
    if(ANS.assurance&&ANS.assurance.includes('souscrite')) pf.push('Assurance voyage déjà souscrite');
    if(ANS.campus_france&&ANS.campus_france.includes('validé')) pf.push('Dossier Campus France validé');
    if(ANS.bourse&&!ANS.bourse.includes('Non')) pf.push('Bourse ou financement institutionnel = crédibilité ++');
    if(ANS.independant_registre&&ANS.independant_registre.includes('registre')) pf.push('Enregistrement professionnel officiel');
    if(ANS.aller_retour&&ANS.aller_retour.includes('achetés')) pf.push('Billets aller-retour achetés');
    if(ANS.retraite_biens&&ANS.retraite_biens.includes('propriétaire')) pf.push('Propriétaire immobilier au Maroc = ancrage solide');
    if(ANS.usa_uk_visa&&!ANS.usa_uk_visa.includes('Non')) pf.push('Visa USA/UK/Canada — profil voyageur rassurant');

    if(ANS.refus&&!ANS.refus.includes('aucun')){flags_r.push('Antécédent(s) de refus de visa — à justifier');pw.push('Antécédent de refus : expliquer les mesures correctives prises');}
    if(ANS.interdiction&&!ANS.interdiction.includes('Non')){flags_r.push('BLOQUANT : Interdiction de territoire ou signalement SIS détecté');}
    if(missing.length>=5) pw.push(missing.length+' documents de base manquants à préparer en priorité');
    if(ANS.releves&&!ANS.releves.includes('actif')) flags_o.push('Relevés bancaires insuffisants ou inexistants');
    if(ANS.emploi&&ANS.emploi.includes('Sans emploi')){flags_r.push('Absence d\'emploi = risque majeur sur intention de retour');}
    if(ANS.assurance==='Non'){flags_r.push('Assurance voyage ABSENTE — document OBLIGATOIRE');}
    if(ANS.hebergement&&ANS.hebergement.includes('défini')) flags_o.push('Hébergement non défini — à confirmer avant dépôt');
    if(ANS.mineur_autorisation&&!ANS.mineur_autorisation.includes('disponible')&&ANS.mineur_autorisation!=='Non applicable') flags_r.push('Autorisation de sortie du mineur non disponible');
    if(ANS.mineur_passeport&&ANS.mineur_passeport.includes('inscrit')) flags_r.push('Mineur inscrit sur passeport parental — NON valide UE');
    if(ANS.campus_france&&ANS.campus_france.includes('en cours')) flags_o.push('Dossier Campus France en cours — à finaliser');
    if(ANS.stage_convention&&!ANS.stage_convention.includes('signée')) flags_o.push('Convention de stage non encore signée');
    if(ANS.independant_liasse&&ANS.independant_liasse.includes('Non')) flags_r.push('Liasses fiscales absentes — document clé pour indépendants');
    if(ANS.docs_traduction&&ANS.docs_traduction.includes('arabe uniquement')) flags_o.push('Documents en arabe uniquement → traduction assermentée en français obligatoire');
    if(ANS.sans_emploi_charge&&ANS.sans_emploi_charge.includes('incapacité')) flags_r.push('Incapacité déclarée à financer le voyage — sponsor obligatoire');
    if(ANS.revenu&&ANS.revenu.includes('Moins de 3 000')) flags_o.push('Revenus très faibles — renforcer les justificatifs bancaires et sponsor');
  } else {
    if(ANS.emploi&&!ANS.emploi.includes('بدون عمل')) pf.push('وضع مهني مُعلن ومستقر');
    if(ANS.visa_schengen_actif&&ANS.visa_schengen_actif.includes('سارية')) pf.push('تأشيرة شنغن سارية — إشارة إيجابية جداً');
    if(ANS.hist_voyage&&ANS.hist_voyage.includes('عدة')) pf.push('سجل سفريات متعددة في منطقة شنغن');
    if(docs.length>=9) pf.push('ملف وثائقي جيد ('+docs.length+' وثيقة)');
    if(ANS.statut_civil&&ANS.statut_civil.includes('متزوج')) pf.push('الوضع الزوجي = ارتباط قوي بالمغرب');
    if(ANS.enfants_maroc==='نعم') pf.push('أطفال قاصرون في المغرب = ضمان العودة');
    if(ANS.assurance&&ANS.assurance.includes('مشترك')) pf.push('تأمين السفر مشترك به بالفعل');
    if(ANS.campus_france&&ANS.campus_france.includes('تم التحقق')) pf.push('ملف Campus France تم التحقق منه');
    if(ANS.bourse&&!ANS.bourse.includes('لا')) pf.push('منحة أو تمويل مؤسسي = مصداقية عالية');
    if(ANS.independant_registre&&ANS.independant_registre.includes('سجل تجاري')) pf.push('تسجيل مهني رسمي');
    if(ANS.aller_retour&&ANS.aller_retour.includes('مدفوعة')) pf.push('تذاكر ذهاب وإياب محجوزة ومدفوعة');
    if(ANS.retraite_biens&&ANS.retraite_biens.includes('مالك')) pf.push('ملكية عقارية في المغرب = ارتباط متين');
    if(ANS.usa_uk_visa&&!ANS.usa_uk_visa.includes('لا')) pf.push('تأشيرة أمريكا/بريطانيا/كندا — ملف مسافر مطمئن');

    if(ANS.refus&&!ANS.refus.includes('لا يوجد')){flags_r.push('سوابق رفض تأشيرة — يجب التوضيح');pw.push('سابقة رفض: توضيح الإجراءات التصحيحية المتخذة');}
    if(ANS.interdiction&&!ANS.interdiction.includes('لا')){flags_r.push('مانع مطلق: حظر دخول أو إشعار SIS');}
    if(missing.length>=5) pw.push(missing.length+' وثائق أساسية ناقصة يجب تحضيرها أولاً');
    if(ANS.releves&&!ANS.releves.includes('نشط')) flags_o.push('كشوف بنكية غير كافية أو غائبة');
    if(ANS.emploi&&ANS.emploi.includes('بدون عمل')) flags_r.push('غياب العمل = خطر رئيسي على نية العودة');
    if(ANS.assurance==='لا') flags_r.push('تأمين السفر غائب — وثيقة إلزامية');
    if(ANS.hebergement&&ANS.hebergement.includes('حُدد')) flags_o.push('الإقامة غير محددة — يجب التأكيد قبل التقديم');
    if(ANS.mineur_autorisation&&!ANS.mineur_autorisation.includes('متوفر')&&ANS.mineur_autorisation!=='غير منطبق') flags_r.push('إذن مغادرة القاصر غير متوفر');
    if(ANS.docs_traduction&&ANS.docs_traduction.includes('العربية فقط')) flags_o.push('وثائق بالعربية فقط → ترجمة قانونية معتمدة بالفرنسية إلزامية');
    if(ANS.sans_emploi_charge&&ANS.sans_emploi_charge.includes('لا أستطيع')) flags_r.push('عدم القدرة على تمويل السفر — كفيل إلزامي');
    if(ANS.revenu&&ANS.revenu.includes('أقل من 3000')) flags_o.push('دخل ضعيف جداً — تقوية المستندات البنكية والكفيل');
  }

  var packRec=SCORE>=75?(fr?'Pack 3 — Suivi Premium':'الباقة 3 — المتابعة المميزة'):SCORE>=50?(fr?'Pack 2 — Accompagnement':'الباقة 2 — المرافقة'):(fr?'Pack 1 — Test & Conseils':'الباقة 1 — الاختبار والنصائح');
  var scoreIdx=SCORE>=75?2:SCORE>=50?1:0;

  var dir=isRTL()?'dir="rtl"':'';
  var html='<div '+dir+'>';

  // Score card
  html+='<div class="card" style="text-align:center">';
  html+='<div class="score-ring" style="border-color:'+lv.col+';color:'+lv.col+'">';
  html+='<div style="font-size:30px;font-weight:600">'+SCORE+'</div>';
  html+='<div style="font-size:11px;color:var(--color-text-secondary)">/100</div></div>';
  html+='<span class="badge '+lv.cls+'">'+lv.lbl+'</span>';
  html+='<p style="margin-top:.5rem;font-size:12px">'+ANS.prenom+' '+ANS.nom+' — '+(ANS.motif||'Visa France')+'</p>';
  html+='</div>';

  // Flags rouges
  if(flags_r.length){
    html+='<div class="card card-warn"><h3 style="color:var(--color-text-danger)">⛔ '+(fr?'Points bloquants':'نقاط مانعة')+'</h3>';
    flags_r.forEach(function(f){html+='<div class="flag"><div class="dot dr"></div>'+f+'</div>';});
    html+='</div>';
  }

  // Points forts
  html+='<div class="card"><h3>'+(fr?'Points forts du dossier':'نقاط قوة الملف')+'</h3>';
  if(pf.length) pf.forEach(function(f){html+='<div class="flag"><div class="dot dg"></div>'+f+'</div>';});
  else html+='<p>'+(fr?'Peu de points forts identifiés — renforcement recommandé.':'نقاط قوة قليلة — يُنصح بالتقوية.')+'</p>';
  html+='</div>';

  // Points faibles
  if(pw.length||flags_o.length){
    html+='<div class="card"><h3>'+(fr?'Points à améliorer':'نقاط تحتاج تحسيناً')+'</h3>';
    pw.forEach(function(f){html+='<div class="flag"><div class="dot dr"></div>'+f+'</div>';});
    flags_o.forEach(function(f){html+='<div class="flag"><div class="dot do"></div>'+f+'</div>';});
    html+='</div>';
  }

  // Docs manquants
  if(missing.length){
    html+='<div class="card"><h3>'+(fr?'Documents manquants (essentiels)':'الوثائق الناقصة الأساسية')+'</h3>';
    missing.slice(0,8).forEach(function(d){html+='<div class="flag"><div class="dot do"></div>'+d+'</div>';});
    if(missing.length>8) html+='<p style="font-size:11px;margin-top:6px">'+(fr?'+ '+(missing.length-8)+' autres...':'+ '+(missing.length-8)+' أخرى...')+'</p>';
    html+='</div>';
  }

  // Recommandation
  html+='<div class="card card-info" style="border-color:var(--color-border-info)">';
  html+='<h3>'+(fr?'Pack recommandé pour vous':'الباقة الموصى بها لك')+'</h3>';
  html+='<p style="font-size:15px;font-weight:600;color:var(--color-text-info);margin:.25rem 0">'+packRec+'</p>';
  html+='<p>'+(fr?'Basé sur votre score de '+SCORE+'/100 et votre profil détaillé.':'بناءً على نتيجتك '+SCORE+'/100 وملفك التفصيلي.')+'</p>';
  html+='</div>';

function buildWA(){
  var fr=LANG==='fr';
  var lv=lvl(SCORE);
  var docs=ANS.docs||[];
  var ALL_DOCS=fr?ALL_DOCS_FR:ALL_DOCS_AR;
  var missing=ALL_DOCS.filter(function(d){return docs.indexOf(d)<0;}).slice(0,3);
  var pf_short=[];
  if(ANS.emploi&&!ANS.emploi.includes('Sans emploi')&&!ANS.emploi.includes('بدون عمل')) pf_short.push(fr?'Situation professionnelle : '+ANS.emploi:'الوضع المهني: '+ANS.emploi);
  if(ANS.visa_schengen_actif&&(ANS.visa_schengen_actif.includes('actif')||ANS.visa_schengen_actif.includes('سارية'))) pf_short.push(fr?'Visa Schengen actif':'تأشيرة شنغن سارية');
  if(docs.length>0) pf_short.push(fr?docs.length+' documents disponibles':docs.length+' وثائق متوفرة');

  var packRec=SCORE>=75?(fr?'Pack 3 — Suivi Premium':'الباقة 3 — المتابعة المميزة'):SCORE>=50?(fr?'Pack 2 — Accompagnement':'الباقة 2 — المرافقة'):(fr?'Pack 1 — Test & Conseils':'الباقة 1 — الاختبار والنصائح');

  var msgFR='Bonjour '+ANS.prenom+' 👋\n\nSuite à votre évaluation visa France, voici votre résumé :\n\n📊 *Score : '+SCORE+'/100 — '+lv.lbl+'*\n🎯 Motif : '+(ANS.motif||'Non précisé')+'\n📍 Ville : '+(ANS.ville_maroc||'Non précisée')+'\n\n✅ *Points forts :*\n'+(pf_short.length?pf_short.map(function(p){return '• '+p;}).join('\n'):'• Peu de points forts identifiés')+'\n\n⚠️ *Priorités avant dépôt :*\n'+(missing.length?missing.map(function(d){return '• '+d;}).join('\n'):'• Dossier bien avancé')+'\n'+(ANS.assurance==='Non'?'• ⛔ Assurance voyage obligatoire — non souscrite\n':'')+'\n📦 *Notre recommandation : '+packRec+'*\n\nContactez-nous pour avancer sur votre dossier. Nous sommes à votre disposition 🤝\n\n_Ce service prépare votre dossier. Il ne garantit pas l\'obtention du visa. La décision appartient aux autorités consulaires françaises._';

  var msgAR='مرحباً '+ANS.prenom+' 👋\n\nبعد تقييم ملف التأشيرة، إليك ملخص نتائجك:\n\n📊 *النتيجة: '+SCORE+'/100 — '+lv.lbl+'*\n🎯 الغرض: '+(ANS.motif||'غير محدد')+'\n📍 المدينة: '+(ANS.ville_maroc||'غير محددة')+'\n\n✅ *نقاط القوة:*\n'+(pf_short.length?pf_short.map(function(p){return '• '+p;}).join('\n'):'• نقاط قوة قليلة')+'\n\n⚠️ *الأولويات قبل التقديم:*\n'+(missing.length?missing.map(function(d){return '• '+d;}).join('\n'):'• الملف في مرحلة متقدمة')+'\n'+(ANS.assurance==='لا'?'• ⛔ تأمين السفر إلزامي — لم يُشترك به\n':'')+'\n📦 *توصيتنا: '+packRec+'*\n\nتواصل معنا للمضي قدماً في ملفك 🤝\n\n_هذه الخدمة تُحضّر ملفك ولا تضمن الحصول على التأشيرة. القرار للسلطات القنصلية الفرنسية._';

  var dir=isRTL()?'dir="rtl"':'';
  var html='<div '+dir+'>';
  html+='<h2 style="margin-bottom:.25rem">'+(fr?'Message WhatsApp':'رسالة واتساب')+'</h2>';
  html+='<p style="margin-bottom:.875rem">'+(fr?'Copiez et envoyez à votre client.':'انسخ وأرسل لعميلك.')+'</p>';
  html+='<div class="tab-row"><div class="tab act" id="t1" onclick="swTab(1)">Français</div><div class="tab" id="t2" onclick="swTab(2)">العربية</div></div>';
  html+='<div class="wa-pre" id="waMsg">'+msgFR+'</div>';
  html+='<button class="btn btn-p" style="margin-top:.75rem" onclick="cpWA()">'+(fr?'Copier le message':'نسخ الرسالة')+'</button>';
  html+='<div class="nav-btns"><button class="btn" onclick="showS(\'s3\')">'+(fr?'← Packs':'← الباقات')+'</button><button class="btn btn-p" onclick="buildJSON()">JSON →</button></div></div>';
  document.getElementById('waZone').innerHTML=html;

  window._waFR=msgFR;window._waAR=msgAR;
  showS('s4');
}
function swTab(n){
  document.getElementById('t1').classList.toggle('act',n===1);
  document.getElementById('t2').classList.toggle('act',n===2);
  var msg=n===1?window._waFR:window._waAR;
  document.getElementById('waMsg').textContent=msg;
  document.getElementById('waMsg').className='wa-pre'+(n===2?' rtl':'');
}
function cpWA(){
  var txt=document.getElementById('waMsg').textContent;
  navigator.clipboard.writeText(txt).then(function(){alert(LANG==='fr'?'Copié !':'تم النسخ!');}).catch(function(){});
}

const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxKzr6Je5va4ly9pozxEO4K69gnxI0hW9IFyt5HE3hC51GYseQPzYSlFpvH0MY8KKWH/exec';

async function sauvegarderClient(answerObj, score, niveau, msgWA, packRec) {
  const payload = {
    action: 'save_client',
    client_id: 'CLI-' + Date.now().toString(36).toUpperCase(),
    langue: LANG,
    prenom: answerObj.prenom || '',
    nom: answerObj.nom || '',
    age: answerObj.age || '',
    ville: answerObj.ville_maroc || '',
    emploi: answerObj.emploi || '',
    motif: answerObj.motif || '',
    score: score,
    niveau: niveau,
    pack_recommande: packRec,
    pack_choisi: '',
    consentement: answerObj.consentement || '',
    points_forts: extrairePointsForts(answerObj),    // tableau de strings
    points_faibles: extrairePointsFaibles(answerObj), // tableau de strings
    docs_manquants: extraireDocsManquants(answerObj), // tableau de strings
    message_wa: msgWA
  };

  try {
    // Google Apps Script ne supporte pas CORS direct — on utilise no-cors
    await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',  // obligatoire avec Apps Script
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    console.log('Client sauvegardé :', payload.client_id);
  } catch (err) {
    console.error('Erreur sauvegarde :', err);
    // Ne pas bloquer l'UI si ça échoue
  }
}
